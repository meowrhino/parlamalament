<!doctype html>
<html lang="ca">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Verificació · El Parlamalament de l'Artista</title>
  <meta name="description" content="Tràmit de legitimació: verifica que ets humà... i que coneixes gent del sector.">

  <!-- Icona -->
  <link rel="icon" href="assets/img/favicon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="assets/img/apple-touch-icon.png">

  <!-- Open Graph / previsualització en compartir -->
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="El Parlamalament de l'Artista">
  <meta property="og:title" content="El Parlamalament de l'Artista">
  <meta property="og:description" content="Aquesta web utilitza l'antagonisme (de manera crítica).">
  <meta property="og:locale" content="ca_ES">
  <meta property="og:url" content="https://parlamalament.com/captcha.html">
  <meta property="og:image" content="https://parlamalament.com/assets/img/og.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:image:alt" content="El Parlamalament de l'Artista">
  <meta name="twitter:card" content="summary_large_image">
  <link rel="stylesheet" href="assets/css/base.css">
  <link rel="stylesheet" href="assets/css/chrome.css">
  <link rel="stylesheet" href="assets/css/captcha.css">
</head>
<body data-page="captcha">
  <a class="skip-link" href="#main">Salta al contingut</a>

  <div class="brand-bg" aria-hidden="true"></div>

  <div class="page">
    <header class="site-header">
      <div class="container">
        <a class="brand-title" href="home.html">El Parlamalament</a>
        <div class="header-meta">
          <a href="#">Suport</a><span class="sep">|</span><a href="#" lang="ca">cat</a>
        </div>
      </div>
    </header>

    <main id="main" class="captcha-wrap">
      <div class="captcha">
        <div class="captcha-head">
          <div class="small">Selecciona totes les imatges amb</div>
          <div class="target">persones que coneixes</div>
          <div class="hint">Si no en queda cap, fes clic a Verifica.</div>
        </div>

        <div id="captcha-grid" class="captcha-grid"
             data-img="assets/img/captcha.png" data-cols="3" data-rows="4"
             role="group" aria-label="Selecciona les persones que coneixes"></div>

        <p class="captcha-msg" id="captcha-msg" role="alert" aria-live="assertive"></p>

        <div class="captcha-bar">
          <div class="captcha-tools">
            <button class="rc-ic" type="button" aria-label="Mostra'n de noves">
              <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M17.65 6.35A8 8 0 1 0 19 13h-2a6 6 0 1 1-1.76-4.24L13 11h6V5z"/></svg>
            </button>
            <button class="rc-ic" type="button" aria-label="Repte d'àudio">
              <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 1a9 9 0 0 0-9 9v7a3 3 0 0 0 3 3h2v-8H5v-2a7 7 0 0 1 14 0v2h-3v8h2a3 3 0 0 0 3-3v-7a9 9 0 0 0-9-9z"/></svg>
            </button>
            <button class="rc-ic" type="button" aria-label="Informació">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="12" cy="12" r="9"/><line x1="12" y1="11" x2="12" y2="16"/><circle cx="12" cy="8" r="1" fill="currentColor" stroke="none"/></svg>
            </button>
          </div>
          <button class="rc-verify" id="captcha-verify" type="button">Verifica</button>
        </div>

        <div class="captcha-brand" aria-hidden="true">
          <span class="rc-logo">
            <svg viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="3" aria-hidden="true">
              <path d="M16 5a11 11 0 0 1 10 6.5"/><path d="M27 4v7h-7"/>
              <path d="M16 27a11 11 0 0 1-10-6.5"/><path d="M5 28v-7h7"/>
            </svg>
          </span>
          <span class="rc-meta"><span class="rc-name">reCAPTCHA</span><span class="rc-terms">Privadesa · Condicions</span></span>
        </div>
      </div>
    </main>

    <footer class="site-footer">
      <div class="container">
        <div class="footer-brand">
          <svg class="mark" viewBox="0 0 100 60" aria-hidden="true"><path d="M4 58 A46 46 0 0 1 96 58 Z" fill="currentColor"/></svg>
          <span class="name">Parlamalament<br>de l'Artista</span>
        </div>
      </div>
    </footer>
  </div>

  <script type="module" src="assets/js/main.js"></script>
</body>
</html>
